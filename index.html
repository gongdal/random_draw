<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>셋로구청 자동 추첨기</title>
<style>
    body { font-family: 'Malgun Gothic', sans-serif; background:#f4f6f8; text-align:center; padding: 20px; }
    textarea { width:260px; height:100px; margin:10px; padding:10px; border-radius:5px; border:1px solid #ccc; }
    button { margin:5px; padding:10px 20px; cursor:pointer; font-weight:bold; background:#333; color:#fff; border:none; border-radius:5px; }
    .machine { font-size:36px; margin:20px; font-weight:bold; color:#2c3e50; min-height:50px; }
    .ball { display:inline-block; margin:5px; font-size:20px; padding:5px; }
    .winner { background:#fff176; border-radius:10px; padding:8px; transform:scale(1.2); border:2px solid #ffd600; font-weight:bold; }
    .hidden { display:none; }
    #paper { max-width:600px; margin:20px auto; background:#fff; padding:30px; border:2px solid #333; text-align:left; box-shadow:5px 5px 0px #ddd; }
    .firework { position:fixed; top:50%; left:50%; font-size:50px; animation:boom 0.8s ease-out forwards; z-index:999; }
    @keyframes boom { 0% {transform:translate(-50%,-50%) scale(0.5); opacity:1;} 100% {transform:translate(-50%,-50%) scale(3); opacity:0;} }
</style>
</head>
<body>

<h2>🎰 셋로구청 자동 추첨기</h2>

<div id="adminArea">
    <div>
        <h3>🪆 피규어 명단 (한 줄에 하나씩)</h3>
        <textarea id="figureInput"></textarea>
    </div>
    <div>
        <h3>🌿 사쉐 명단 (한 줄에 하나씩)</h3>
        <textarea id="sachetInput"></textarea>
    </div>
    <button onclick="generate()">🎯 1. 추첨하기</button>
    <button onclick="copyLink()">🔗 2. 결과 링크 복사</button>
</div>

<div class="machine" id="machine">🎲 대기 중...</div>

<div id="paper">
    <h3>📋 참여자 확인</h3>
    <p>피규어: <span id="figureList"></span></p>
    <p>사쉐: <span id="sachetList"></span></p>
    <hr>
    <h3>🎯 당첨 결과</h3>
    <div id="figureResult" style="margin-bottom:15px;"></div>
    <div id="sachetResult"></div>
</div>

<script>
let globalResult = null;

function pickTwo(arr) {
    let a = [...arr];
    let res = [];
    for(let i=0; i<2; i++) {
        if(a.length > 0) {
            let idx = Math.floor(Math.random()*a.length);
            res.push(a.splice(idx,1)[0]);
        }
    }
    return res;
}

function generate() {
    const f = document.getElementById("figureInput").value.split("\n").filter(x => x.trim());
    const s = document.getElementById("sachetInput").value.split("\n").filter(x => x.trim());

    if(f.length < 2 || s.length < 2) return alert("최소 2명씩은 입력해주세요!");

    globalResult = {
        fL: f, // figureList
        sL: s, // sachetList
        fW: pickTwo(f), // figureWinners
        sW: pickTwo(s)  // sachetWinners
    };
    alert("추첨 완료! 이제 2번 버튼을 눌러 링크를 복사하세요.");
}

function copyLink() {
    if(!globalResult) return alert("추첨을 먼저 진행해주세요!");
    
    // 데이터를 단순 JSON -> String -> URI 인코딩만 수행 (가장 안전함)
    const dataStr = encodeURIComponent(JSON.stringify(globalResult));
    const url = window.location.origin + window.location.pathname + "?res=" + dataStr;

    navigator.clipboard.writeText(url).then(() => {
        alert("링크 복사 성공! 이 링크를 공유하면 결과가 확인할 수 있습니다.");
    }).catch(() => {
        alert("링크 복사 실패! 주소창의 긴 주소를 수동으로 복사해주세요.");
    });
}

function firework() {
    let el = document.createElement("div");
    el.className = "firework"; el.innerText = "🎉";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
}

async function startShow(winners, targetId) {
    const box = document.getElementById(targetId);
    box.innerHTML = "";
    const m = document.getElementById("machine");

    for(let i=3; i>0; i--) { m.innerText = i + "..."; await new Promise(r => setTimeout(r, 600)); }
    
    m.innerText = "🎲 추첨 중...";
    await new Promise(r => setTimeout(r, 1000));

    for(let name of winners) {
        let span = document.createElement("span");
        span.className = "ball winner";
        span.innerText = name;
        box.appendChild(span);
        firework();
        await new Promise(r => setTimeout(r, 1000));
    }
    m.innerText = "축하합니다! 🎉";
}

window.onload = async function() {
    const urlParams = new URLSearchParams(window.location.search);
    const resData = urlParams.get("res");

    if(!resData) return;

    // 데이터가 있으면 입력창 숨기기
    document.getElementById("adminArea").style.display = "none";

    try {
        const d = JSON.parse(decodeURIComponent(resData));

        document.getElementById("figureList").innerText = d.fL.join(", ");
        document.getElementById("sachetList").innerText = d.sL.join(", ");

        await startShow(d.fW, "figureResult");
        await new Promise(r => setTimeout(r, 500));
        await startShow(d.sW, "sachetResult");
        
        document.getElementById("machine").innerText = "추첨 종료 🎊";
    } catch(e) {
        console.error(e);
        alert("데이터를 불러오는데 실패했습니다.");
    }
}
</script>
</body>
</html>
