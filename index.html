<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>셋로구청 추첨 시스템</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
    font-family: 'Malgun Gothic', sans-serif;
    background:#f4f6f8;
    text-align:center;
}

textarea {
    width:260px;
    height:120px;
    margin:10px;
}

button {
    margin:5px;
    padding:10px 18px;
    cursor:pointer;
}

.machine {
    font-size:30px;
    height:40px;
    margin-top:10px;
}

.ball {
    font-size:22px;
    margin:5px;
}

.hidden {
    filter: blur(10px);
}

#captureArea {
    width:700px;
    margin:40px auto;
    background:white;
    padding:40px;
    border:1px solid #000;
    text-align:left;
}
</style>
</head>

<body>

<h2>🎰 셋로구청 자동 추첨기</h2>

<div>
    <h3>🪆 피규어</h3>
    <textarea id="figureInput" placeholder="이모지 한 줄씩 입력"></textarea>

    <h3>🌿 사쉐</h3>
    <textarea id="sachetInput" placeholder="이모지 한 줄씩 입력"></textarea>
</div>

<button onclick="generate()">🎯 결과 생성</button>
<button onclick="reveal()">👀 결과 공개</button>
<button onclick="copyLink()">🔗 결과 링크 복사</button>
<button onclick="openShortener()">✂️ 링크 줄이기</button>
<button onclick="capture()">📸 이미지 저장</button>

<div class="machine" id="machine">🎲</div>

<!-- 공문 결과 -->
<div id="captureArea">

<h2 style="text-align:center;">셋로구청</h2>
<h3 style="text-align:center;">보도자료</h3>

<p style="text-align:right; font-size:12px;">
(온라인) 2026. 05. 04.<br>
보도시점 (즉시 보도)
</p>

<hr>

<h2 style="text-align:center;">
공시생 추첨 결과 발표
</h2>

<hr>

<p>□ 추첨 결과는 아래와 같다.</p>

<h3>1. 당첨 결과</h3>

<p>○ 🪆 피규어</p>
<div id="figureResult" class="hidden"></div>

<p>○ 🌿 사쉐</p>
<div id="sachetResult" class="hidden"></div>

<br>

<p style="text-align:right;">
2026. 05. 04.<br><br>
셋로구청장 김달주
</p>

<!-- 🔴 텍스트 도장 -->
<div style="
    width:90px;
    height:90px;
    border:3px solid red;
    border-radius:50%;
    color:red;
    font-weight:bold;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:auto;
    margin-top:-40px;
    transform: rotate(-15deg);
    text-align:center;
    line-height:1.2;
">
셋로구<br>청장<br>인
</div>

</div>

<script>
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

let result={figure:null,sachet:null};

function pickTwo(arr){
    let a=[...arr];
    let res=[];
    for(let i=0;i<2;i++){
        let idx=Math.floor(Math.random()*a.length);
        res.push(a.splice(idx,1)[0]);
    }
    return res;
}

async function generate(){

    let f=document.getElementById("figureInput").value.split("\n").filter(x=>x);
    let s=document.getElementById("sachetInput").value.split("\n").filter(x=>x);

    if(f.length<2||s.length<2){
        alert("각 최소 2명 필요!");
        return;
    }

    result.figure=pickTwo(f);
    result.sachet=pickTwo(s);

    document.getElementById("figureResult").innerHTML =
        result.figure.map(x=>`<div class="ball">${x}</div>`).join("");

    document.getElementById("sachetResult").innerHTML =
        result.sachet.map(x=>`<div class="ball">${x}</div>`).join("");

    document.getElementById("figureResult").classList.add("hidden");
    document.getElementById("sachetResult").classList.add("hidden");

    let m=document.getElementById("machine");
    for(let i=0;i<20;i++){
        m.innerText=["🎲","✨","🎯"][Math.floor(Math.random()*3)];
        await sleep(80);
    }
    m.innerText="완료";
}

function reveal(){
    document.getElementById("figureResult").classList.remove("hidden");
    document.getElementById("sachetResult").classList.remove("hidden");
}

function copyLink(){

    if(!result.figure||!result.sachet){
        alert("먼저 결과 생성!");
        return;
    }

    let raw=JSON.stringify(result);
    let encoded=btoa(unescape(encodeURIComponent(raw)));

    let url=location.origin+location.pathname+"?data="+encoded;

    navigator.clipboard.writeText(url);
    alert("링크 복사 완료!");
}

function openShortener(){
    window.open("https://bitly.com/");
}

function capture(){
    html2canvas(document.getElementById("captureArea")).then(canvas=>{
        let a=document.createElement("a");
        a.href=canvas.toDataURL();
        a.download="result.png";
        a.click();
    });
}

window.onload=function(){

    let p=new URLSearchParams(location.search);
    let data=p.get("data");

    if(data){
        let decoded = JSON.parse(
            new TextDecoder().decode(
                Uint8Array.from(atob(data), c => c.charCodeAt(0))
            )
        );
        result=decoded;

        document.getElementById("figureResult").innerHTML =
            result.figure.map(x=>`<div class="ball">${x}</div>`).join("");

        document.getElementById("sachetResult").innerHTML =
            result.sachet.map(x=>`<div class="ball">${x}</div>`).join("");

        document.getElementById("figureResult").classList.add("hidden");
        document.getElementById("sachetResult").classList.add("hidden");
    }
}
</script>

</body>
</html>
