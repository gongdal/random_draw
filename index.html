<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>셋로구청 공식 추첨 결과</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
    font-family: 'Malgun Gothic', sans-serif;
    background:#f4f6f8;
    text-align:center;
}

.machine {
    font-size:40px;
    height:60px;
    margin-top:20px;
}

.ball {
    font-size:26px;
    margin:5px;
}

.hidden {
    filter: blur(10px);
}

#captureArea {
    width:700px;
    margin:40px auto;
    background:white;
    padding:40px;
    border:1px solid #000;
    text-align:left;
}
</style>
</head>

<body>

<h2>🎰 셋로구청 공식 추첨 시스템</h2>

<div class="machine" id="machine">🎲</div>

<!-- 공문 결과 -->
<div id="captureArea">

<h2 style="text-align:center;">셋로구청</h2>
<h3 style="text-align:center;">보도자료</h3>

<p style="text-align:right; font-size:12px;">
(온라인) 2026. 05. 04.<br>
보도시점 (즉시 보도)
</p>

<hr>

<h2 style="text-align:center;">
공시생 추첨 결과 발표
</h2>

<hr>

<p>□ 추첨 결과는 아래와 같다.</p>

<h3>1. 당첨 결과</h3>

<p>○ 🪆 피규어</p>
<div id="figureResult" class="hidden"></div>

<p>○ 🌿 사쉐</p>
<div id="sachetResult" class="hidden"></div>

<br>

<p style="text-align:right;">
2026. 05. 04.<br><br>
셋로구청장 김달주
</p>

<!-- 🔴 도장 -->
<div style="
    width:90px;
    height:90px;
    border:3px solid red;
    border-radius:50%;
    color:red;
    font-weight:bold;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:auto;
    margin-top:-40px;
    transform: rotate(-15deg);
    text-align:center;
    line-height:1.2;
">
셋로구<br>청장<br>인
</div>

</div>

<script>
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

let result={figure:[], sachet:[]};

async function playAnimation(){

    let m=document.getElementById("machine");

    // 🎲 굴리는 연출
    for(let i=0;i<25;i++){
        m.innerText=["🎲","✨","🎯"][Math.floor(Math.random()*3)];
        await sleep(80);
    }

    m.innerText="추첨 완료";

    await sleep(500);

    // 결과 공개
    document.getElementById("figureResult").classList.remove("hidden");
    document.getElementById("sachetResult").classList.remove("hidden");
}

window.onload = async function(){

    let p=new URLSearchParams(location.search);
    let data=p.get("data");

    if(!data){
        document.getElementById("machine").innerText="데이터 없음";
        return;
    }

    // ✅ 디코딩
    let decoded = JSON.parse(
        new TextDecoder().decode(
            Uint8Array.from(atob(data), c => c.charCodeAt(0))
        )
    );

    result = decoded;

    // 결과 미리 넣어두기 (숨김 상태)
    document.getElementById("figureResult").innerHTML =
        result.figure.map(x=>`<div class="ball">${x}</div>`).join("");

    document.getElementById("sachetResult").innerHTML =
        result.sachet.map(x=>`<div class="ball">${x}</div>`).join("");

    // 애니메이션 실행
    await playAnimation();
}
</script>

</body>
</html>
